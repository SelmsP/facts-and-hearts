<div class="categories-container">
  <h1>SELECT YOUR CATEGORIES</h1>
  <p class="subtitle">Select a category to start playing!</p>

  <div class="category-list">
  
    <button class="category-card" [routerLink]="['/trivia-science']">
      <div class="card-left">
        <span class="icon">🔬</span>
        <span class="category-name">Science</span>
      </div>
      <span class="arrow">→</span>
    </button>

   
    <button class="category-card" [routerLink]="['/trivia-history']">
      <div class="card-left">
        <span class="icon">📜</span>
        <span class="category-name">History</span>
      </div>
      <span class="arrow">→</span>
    </button>

    
    <button class="category-card" [routerLink]="['/trivia-generalknowledge']">
      <div class="card-left">
        <span class="icon">📚</span>
        <span class="category-name">General Knowledge</span>
      </div>
      <span class="arrow">→</span>
    </button>
  </div>

  
  <div class="how-to-play-card">
    <h3>How to Play</h3>
    <ol>
      <li>Select a category above</li>
      <li>Answer 10 questions</li>
      <li>Check your score</li>
    </ol>
  </div>
</div>
