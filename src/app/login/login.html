<div class="login-page">
  <div class="card">
    
    <h1>Login to Your Account</h1>
    <p class="subtitle">Please enter your credentials to log in</p>

    
    <div class="alert-error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Username</label>
        <input type="text" placeholder="Enter username" formControlName="username" 
               [class.is-invalid]="submitted && f['username'].errors">
        <div class="error-msg" *ngIf="submitted && f['username'].errors">
          <span *ngIf="f['username'].hasError('required')">Username is required</span>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Enter password" formControlName="password"
               [class.is-invalid]="submitted && f['password'].errors">
        <div class="error-msg" *ngIf="submitted && f['password'].errors">
          <span *ngIf="f['password'].hasError('required')">Password is required</span>
        </div>
      </div>

      <button type="submit" class="btn-primary">Login</button>
      <p class="footer-text">Don't have an account? <a routerLink="/register">Register here</a></p>
    </form>
  </div>
</div>
