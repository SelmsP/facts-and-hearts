<div class="register-page">
  <div class="card">
    
  <h1>Create Account</h1>
  <p class="subtitle">Join Facts & Hearts today!</p>


  <div *ngIf="successMessage" class="alert-success">
    {{ successMessage }}
  </div>

  <form *ngIf="registerForm" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    

    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" type="text" formControlName="username" 
             [class.is-invalid]="submitted && f['username'].errors">
      <div class="error-msg" *ngIf="submitted && f['username'].errors">
        <small *ngIf="f['username'].hasError('required')">Username is required</small>
        <small *ngIf="f['username'].hasError('minlength')">Minimum 3 characters</small>
      </div>
    </div>


    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email"
             [class.is-invalid]="submitted && f['email'].errors">
      <div class="error-msg" *ngIf="submitted && f['email'].errors">
        <small *ngIf="f['email'].hasError('required')">Email is required</small>
        <small *ngIf="f['email'].hasError('email')">Invalid email format</small>
      </div>
    </div>


    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password"
             [class.is-invalid]="submitted && f['password'].errors">
      <div class="error-msg" *ngIf="submitted && f['password'].errors">
        <small *ngIf="f['password'].hasError('required')">Password is required</small>
        <small *ngIf="f['password'].hasError('minlength')">Minimum 6 characters</small>
      </div>
    </div>

 
    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>
      <input id="confirmPassword" type="password" formControlName="confirmPassword"
             [class.is-invalid]="submitted && (f['confirmPassword'].errors || registerForm.hasError('mismatch'))">
      <div class="error-msg" *ngIf="submitted">
        <small *ngIf="f['confirmPassword'].hasError('required')">Please confirm your password</small>
        <small *ngIf="!f['confirmPassword'].errors && registerForm.hasError('mismatch')">
          Passwords do not match
        </small>
      </div>
    </div>

    <button type="submit" class="btn-primary">Register</button>
  </form>
</div>
